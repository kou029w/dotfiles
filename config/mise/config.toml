[settings]
paranoid = true
idiomatic_version_file_enable_tools = ["node", "rust"]
install_before = "1d"

[tools]
"cargo:https://github.com/kou029w/jobcan-cli" = "latest"
"core:bun" = "latest"
"core:deno" = "latest"
"core:go" = "latest"
"core:node" = "lts"
"core:rust" = "latest"
"github:aaif-goose/goose" = "latest"
"github:astral-sh/uv" = "latest"
"github:bluesky-social/goat" = "latest"
"github:cli/cli" = "latest"
"github:hadolint/hadolint" = "latest"
"github:mvdan/sh" = { version = "latest", bin = "shfmt" }
"github:rclone/rclone" = "latest"
"npm:@anthropic-ai/claude-code" = { version = "latest", npm_args = "--ignore-scripts=false" }
"npm:@agentclientprotocol/claude-agent-acp" = "latest"
"npm:@github/copilot" = "latest"
"npm:heroku" = "latest"
"npm:opencode-ai" = { version = "latest", npm_args = "--ignore-scripts=false" }
"npm:playwright" = "latest"
"npm:pnpm" = "latest"
"npm:serve" = "latest"
"npm:wrangler" = "latest"
